apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: kubicvalheim

resources:
  - ../../base

components:
  - ../../components/observability
  - ../../components/secrets-openbao
  # - ../../components/backup   # inert scaffold; enable in Phase 3

patches:
  - target:
      kind: Service
      name: valheim
    patch: |-
      - op: replace
        path: /spec/ports/0/nodePort
        value: 32456
      - op: replace
        path: /spec/ports/1/nodePort
        value: 32457
  # Per-instance name/world (strategic merge by env name — order-independent;
  # matches the plain "midgard" example).
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: valheim
      spec:
        template:
          spec:
            containers:
              - name: valheim-server
                env:
                  - name: NAME
                    value: KubicValheim
                  - name: WORLD
                    value: Midgard
