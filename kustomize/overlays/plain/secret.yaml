apiVersion: v1
kind: Secret
metadata:
  name: valheim-secrets
type: Opaque
stringData:
  # REQUIRED: set a real password locally before applying (>= 5 chars, must not
  # contain the server NAME). Left empty so applying this overlay as-is can't ship
  # a known credential — the server refuses to start until a real password is set.
  serverPass: ""
