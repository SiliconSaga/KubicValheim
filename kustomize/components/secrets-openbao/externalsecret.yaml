apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: valheim-secrets
  labels:
    app.kubernetes.io/part-of: kubicvalheim
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-kv          # the ESO ClusterSecretStore fronting OpenBAO (nidavellir)
    kind: ClusterSecretStore
  target:
    name: valheim-secrets     # SAME name as the plain Secret — pod spec unchanged
    creationPolicy: Owner
  data:
    - secretKey: serverPass
      remoteRef:
        key: secret/valheim   # KV-v2 mount "secret", path "valheim" (matches the demo's secret/demo)
        property: serverPass
